<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - النوايا</title>
    <style>
        body { font-family: Tahoma, Arial, sans-serif; background: #f3f4f6; padding: 20px; }
        .admin-box { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #1f2937; text-align: center; margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-top: 15px; color: #4b5563; }
        input[type="text"], textarea { width: 100%; padding: 10px; margin-top: 8px; border: 1px solid #d1d5db; border-radius: 8px; box-sizing: border-box; font-family: inherit;}
        textarea { height: 180px; resize: vertical; line-height: 1.6;}
        .checkbox-container { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; background: #e0f2fe; padding: 15px; border-radius: 8px;}
        button { margin-top: 25px; width: 100%; padding: 12px; background: #10b981; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s;}
        button:hover { background: #059669; }
    </style>

    <!-- استدعاء مكاتب فايربيس -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <div class="admin-box">
        <h2>إدارة قسم "جدد نواياك"</h2>

        <div class="checkbox-container">
            <input type="checkbox" id="toggle-visibility">
            <label for="toggle-visibility" style="margin: 0;">إظهار القسم للمستخدمين في التطبيق</label>
        </div>

        <label for="niyyat-title">عنوان القسم:</label>
        <input type="text" id="niyyat-title" placeholder="مثال: جدد نواياك اليومية">

        <label for="niyyat-items">قائمة النوايا (كل نية في سطر منفصل):</label>
        <textarea id="niyyat-items" placeholder="اكتب النية هنا... واضغط Enter لتكتب النية التالية في سطر جديد"></textarea>

        <button onclick="saveAdminSettings()">حفظ ونشر التعديلات</button>
    </div>

    <script>
        // ==========================================
        // 1. ضع إعدادات Firebase الخاصة بك هنا
        // (انسخها كما هي من ملف script.js الأساسي)
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyD8ltXQrl8XhRbjLlOfr5QiTGx_IQMan3U",
            authDomain: "mohasba-app.firebaseapp.com",
            projectId: "mohasba-app",
            storageBucket: "mohasba-app.firebasestorage.app",
            messagingSenderId: "24957282420",
            appId: "1:24957282420:web:982d83e0e0b1f7d6da8921"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ==========================================
        // 2. دالة لجلب البيانات الحالية عند فتح الصفحة
        // ==========================================
        async function loadCurrentSettings() {
            try {
                const docRef = db.collection("app_settings").doc("niyyat_section");
                const doc = await docRef.get();
                
                if (doc.exists) {
                    const data = doc.data();
                    document.getElementById('toggle-visibility').checked = data.isVisible;
                    document.getElementById('niyyat-title').value = data.title;
                    // تحويل الـ Array إلى سطور لتظهر في مربع النص
                    document.getElementById('niyyat-items').value = data.intentions.join('\n');
                } else {
                    // في حالة فتح اللوحة لأول مرة والوثيقة غير موجودة في فايربيس
                    document.getElementById('toggle-visibility').checked = true;
                }
            } catch (error) {
                console.error("خطأ في جلب البيانات:", error);
            }
        }

        // ==========================================
        // 3. دالة لحفظ التعديلات الجديدة في فايربيس
        // ==========================================
        async function saveAdminSettings() {
            const btn = document.querySelector('button');
            btn.innerText = "جاري الحفظ...";
            btn.style.background = "#9ca3af";

            const isVisible = document.getElementById('toggle-visibility').checked;
            const title = document.getElementById('niyyat-title').value;
            const intentionsText = document.getElementById('niyyat-items').value;
            
            // تحويل النص المكتوب إلى Array (فلترة السطور الفارغة)
            const intentionsArray = intentionsText.split('\n').filter(item => item.trim() !== '');

            try {
                await db.collection("app_settings").doc("niyyat_section").set({
                    isVisible: isVisible,
                    title: title,
                    intentions: intentionsArray
                });
                
                alert("تم التحديث بنجاح! التعديلات مسمعة دلوقتي في التطبيق.");
                btn.innerText = "حفظ ونشر التعديلات";
                btn.style.background = "#10b981";
            } catch (error) {
                console.error("خطأ في الحفظ:", error);
                alert("حدث خطأ أثناء الحفظ.");
                btn.innerText = "حفظ ونشر التعديلات";
                btn.style.background = "#10b981";
            }
        }

        // تشغيل دالة الجلب فور تحميل الصفحة
        window.onload = loadCurrentSettings;
    </script>

</body>
</html>
